services:
  - type: web
    name: au-lost-and-found
    runtime: java
    plan: free
    buildCommand: |
      cd frontend-react && npm install && npm run build && cd .. &&
      rm -rf backend/src/main/resources/static/* &&
      cp -r frontend-react/dist/* backend/src/main/resources/static/ &&
      cd backend && mvn clean package -DskipTests
    startCommand: cd backend && java -jar target/*.jar --server.port=$PORT
    envVars:
      - key: PORT
        value: 8080
